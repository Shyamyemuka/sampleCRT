<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8. Centering with Auto Margin</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .container {
            border: 2px solid black;
            padding: 10px;
        }

        .box {
            width: 200px;
            background-color: #9b59b6;
            color: white;
            padding: 20px;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <h1>8. Centering with Auto Margin</h1>
    <p><strong>Question:</strong> Setting horizontal margins to auto centers a block element within its parent.</p>
    <div class="container">
        <div class="box">This box is centered horizontally within its container using margin: 0 auto.</div>
    </div>
</body>

</html>
