<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4. External Spacing (Margin)</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .box {
            width: 200px;
            background-color: lightcoral;
            padding: 10px;
            border: 2px solid darkred;
            margin: 30px;
        }

        .container {
            border: 1px dashed gray;
            display: inline-block;
        }
    </style>
</head>

<body>
    <h1>4. External Spacing (Margin)</h1>
    <p><strong>Question:</strong> Margins create space outside the border to push other elements away.</p>
    <div class="container">
        <div class="box">This box has a 30px margin pushing it away from its container's dashed edge.</div>
    </div>
</body>

</html>
