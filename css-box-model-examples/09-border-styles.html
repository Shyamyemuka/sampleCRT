<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9. Using Different Border Styles</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .box1 {
            width: 200px;
            padding: 10px;
            border: 4px dashed #e67e22;
            margin-bottom: 20px;
        }

        .box2 {
            width: 200px;
            padding: 10px;
            border: 4px dotted #27ae60;
        }
    </style>
</head>

<body>
    <h1>9. Using Different Border Styles</h1>
    <p><strong>Question:</strong> Borders don't have to be solid; they can be dotted or dashed.</p>
    <div class="box1">This box has a dashed border.</div>
    <div class="box2">This box has a dotted border.</div>
</body>

</html>
