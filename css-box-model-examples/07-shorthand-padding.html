<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7. Shorthand Padding</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .box {
            width: 250px;
            background-color: #f1c40f;
            /* top: 10px, right: 20px, bottom: 30px, left: 40px */
            padding: 10px 20px 30px 40px;
            border: 2px solid #333;
        }
    </style>
</head>

<body>
    <h1>7. Shorthand Padding</h1>
    <p><strong>Question:</strong> You can set different values for top, right, bottom, and left in one line (clockwise).
    </p>
    <div class="box">Padding: 10px top, 20px right, 30px bottom, 40px left. Note how the spacing inside differs on each
        side.</div>
</body>

</html>
