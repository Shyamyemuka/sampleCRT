<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10. Transparent Box (Opacity)</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background-image: repeating-linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee), repeating-linear-gradient(45deg, #eee 25%, #fff 25%, #fff 75%, #eee 75%, #eee);
            background-color: #fff;
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        .container {
            background-color: white;
            padding: 20px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }

        .box {
            width: 200px;
            height: 100px;
            background-color: #2980b9;
            color: white;
            padding: 20px;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>10. Transparent Box (Opacity)</h1>
        <p><strong>Question:</strong> Adjusting the box transparency while maintaining its layout size.</p>
    </div>

    <div class="box">This box has 50% opacity. You can see the checkerboard background through it.</div>
</body>

</html>
